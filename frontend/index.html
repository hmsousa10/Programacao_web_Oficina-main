<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGO – Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <!-- Theme Toggle -->
  <div class="login-theme-toggle">
    <span class="theme-toggle-icon">☀️</span>
    <label class="theme-switch" title="Alternar tema claro/escuro">
      <input type="checkbox" class="theme-checkbox" aria-label="Alternar tema">
      <span class="theme-slider"></span>
    </label>
    <span class="theme-toggle-icon">🌙</span>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🔧</div>
      <h1 class="login-title">SGO</h1>
      <p class="login-subtitle">Sistema de Gestão de Oficina</p>
    </div>

    <div class="login-body">
      <div id="login-error" class="login-error" role="alert"></div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group" style="margin-bottom:1rem">
          <label for="username">Utilizador</label>
          <input type="text" id="username" name="username" placeholder="nome.utilizador"
                 autocomplete="username" required autofocus>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label for="password">Palavra-passe</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
                 autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">
          <span id="login-btn-text">Entrar</span>
          <span id="login-spinner" class="spinner hidden"></span>
        </button>
      </form>
    </div>

    <div class="login-footer">
      Sistema de Gestão de Oficina &copy; 2026
    </div>
  </div>

  <script src="js/utils.js" defer></script>
  <script src="js/api.js"   defer></script>
  <script src="js/auth.js"  defer></script>
  <script defer>
    // If already logged in, redirect to appropriate page
    document.addEventListener('DOMContentLoaded', () => {
      initThemeToggle();
      const token = sessionStorage.getItem('sgo_token');
      const user  = sessionStorage.getItem('sgo_user');
      if (token && user) {
        redirectByRole(JSON.parse(user));
      }
    });

    async function handleLogin(e) {
      e.preventDefault();
      const username  = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;
      const btnText   = document.getElementById('login-btn-text');
      const spinner   = document.getElementById('login-spinner');
      const errorBox  = document.getElementById('login-error');
      const btn       = document.getElementById('login-btn');

      if (!username || !password) {
        showLoginError('Por favor preencha todos os campos.');
        return;
      }

      // Loading state
      btn.disabled = true;
      btnText.textContent = 'A entrar…';
      spinner.classList.remove('hidden');
      errorBox.classList.remove('show');

      try {
        const user = await login(username, password);
        redirectByRole(user);
      } catch (err) {
        showLoginError(err.message || 'Credenciais inválidas. Tente novamente.');
        btn.disabled = false;
        btnText.textContent = 'Entrar';
        spinner.classList.add('hidden');
      }
    }

    function showLoginError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
