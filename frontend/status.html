<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SGO - Estado do Veículo</title>
  <style>
    /* CSS embutido para velocidade máxima no telemóvel do cliente */
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; min-height: 100vh; }
    .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
    .header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
    .header h1 { margin: 0; color: #38bdf8; font-size: 24px; letter-spacing: 1px; }
    .header p { margin: 5px 0 0 0; color: #94a3b8; font-size: 14px; }
    
    .vehicle-card { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 25px; border-top: 4px solid #38bdf8; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .plate { display: inline-block; background: white; color: black; font-size: 22px; font-weight: 800; letter-spacing: 2px; padding: 4px 15px; border-radius: 6px; border: 2px solid #cbd5e1; margin-bottom: 10px; }
    .model { margin: 0; font-size: 16px; color: #cbd5e1; }
    
    .timeline { position: relative; padding-left: 30px; margin-bottom: 30px; }
    .timeline::before { content: ''; position: absolute; left: 11px; top: 5px; bottom: 5px; width: 2px; background: #334155; }
    .tl-item { position: relative; margin-bottom: 25px; }
    .tl-dot { position: absolute; left: -30px; width: 24px; height: 24px; border-radius: 50%; background: #1e293b; border: 2px solid #475569; display: flex; justify-content: center; align-items: center; font-size: 12px; z-index: 2; }
    .tl-content { padding-top: 2px; }
    .tl-title { margin: 0; font-size: 16px; font-weight: 600; color: #94a3b8; }
    .tl-desc { margin: 4px 0 0 0; font-size: 13px; color: #64748b; }
    
    /* Estados da Timeline */
    .tl-item.done .tl-dot { background: #10b981; border-color: #10b981; color: white; }
    .tl-item.done .tl-title { color: #10b981; }
    .tl-item.active .tl-dot { background: #38bdf8; border-color: #38bdf8; color: white; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2); animation: pulse 2s infinite; }
    .tl-item.active .tl-title { color: #38bdf8; }
    .tl-item.warning .tl-dot { background: #f59e0b; border-color: #f59e0b; color: white; }
    .tl-item.warning .tl-title { color: #f59e0b; }
    
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }

    .price-card { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 25px; }
    .price-card h3 { margin: 0 0 5px 0; color: #10b981; font-size: 32px; }
    .price-card p { margin: 0; color: #94a3b8; font-size: 13px; }

    .ops-box { background: #1e293b; border-radius: 12px; padding: 20px; }
    .ops-box h3 { margin: 0 0 15px 0; font-size: 15px; color: #f8fafc; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .op-item { display: flex; justify-content: space-between; font-size: 14px; padding: 10px 0; border-bottom: 1px dashed #334155; }
    .op-item:last-child { border-bottom: none; padding-bottom: 0; }
    .op-status.concluida { color: #10b981; font-weight: bold;}
    .op-status.pendente { color: #f59e0b; font-weight: bold;}

    .loading { text-align: center; margin-top: 50px; color: #94a3b8; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #38bdf8; animation: spin 1s ease-in-out infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="app-container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>A sincronizar com a oficina...</p>
    </div>
  </div>

  <script src="js/status.js"></script>
</body>
</html>
